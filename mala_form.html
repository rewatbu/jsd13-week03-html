<head>

        </label>

        <p>เลือกเมนูที่ชอบ:</p>
        <label>เนื้อหมู
            <input type="checkbox">
        </label>
        <label>เนื้อไก่
            <input type="checkbox">
        </label>
        <label>ไข่ไก่

        </label>
        <label>เต้าหู้
            <input type="checkbox">
        </label><br />

        <p><button type="submit">กดสั่งอาหาร</button></p>


    </form>
